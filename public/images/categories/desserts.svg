<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Ground shadow -->
  <ellipse cx="300" cy="356" rx="90" ry="14" fill="#500724" opacity="0.45" filter="url(#blur)"/>

  <!-- === CUPCAKE === -->

  <!-- Paper cup base -->
  <path d="M238,280 L252,355 L348,355 L362,280 Z" fill="#F472B6"/>
  <path d="M240,280 L253,352 L347,352 L360,280 Z" fill="#FBCFE8"/>
  <!-- Cup stripes -->
  <line x1="268" y1="280" x2="258" y2="352" stroke="#F472B6" stroke-width="3" opacity="0.6"/>
  <line x1="290" y1="280" x2="284" y2="352" stroke="#F472B6" stroke-width="3" opacity="0.6"/>
  <line x1="312" y1="280" x2="310" y2="352" stroke="#F472B6" stroke-width="3" opacity="0.6"/>
  <line x1="334" y1="280" x2="335" y2="352" stroke="#F472B6" stroke-width="3" opacity="0.6"/>
  <!-- Cup rim -->
  <ellipse cx="300" cy="280" rx="62" ry="12" fill="#F9A8D4"/>

  <!-- Cake body -->
  <rect x="238" y="248" width="124" height="36" rx="8" fill="#FDF2F8"/>
  <rect x="240" y="250" width="120" height="32" rx="7" fill="white" opacity="0.8"/>

  <!-- === FROSTING / CREAM === -->
  <!-- Base blob -->
  <ellipse cx="300" cy="248" rx="70" ry="20" fill="#FDF4FF"/>

  <!-- Swirl layer 1 (bottom) -->
  <path d="M230,245 Q230,210 265,200 Q300,190 335,200 Q370,210 370,245 Q370,248 300,248 Q230,248 230,245 Z" fill="#F0ABFC"/>

  <!-- Swirl layer 2 -->
  <path d="M245,240 Q245,210 273,202 Q300,194 327,202 Q355,210 355,240 Q355,242 300,242 Q245,242 245,240 Z" fill="#E879F9"/>

  <!-- Swirl layer 3 (top peak) -->
  <path d="M260,235 Q260,210 280,200 Q300,192 320,200 Q340,210 340,235 Q340,237 300,237 Q260,237 260,235 Z" fill="#D946EF"/>

  <!-- Peak -->
  <path d="M280,232 Q285,205 300,192 Q315,205 320,232" fill="#C026D3"/>
  <ellipse cx="300" cy="192" rx="14" ry="10" fill="#A21CAF"/>
  <ellipse cx="294" cy="187" rx="5" ry="4" fill="#E879F9" opacity="0.5"/>

  <!-- Frosting highlight -->
  <path d="M248,228 Q250,215 260,208" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- === SPRINKLES === -->
  <rect x="258" y="230" width="12" height="5" rx="2.5" fill="#34D399" transform="rotate(30,264,232)"/>
  <rect x="325" y="225" width="11" height="4" rx="2" fill="#FCD34D" transform="rotate(-20,330,227)"/>
  <rect x="278" y="218" width="10" height="4" rx="2" fill="#60A5FA" transform="rotate(50,283,220)"/>
  <rect x="310" y="222" width="11" height="4" rx="2" fill="#F87171" transform="rotate(-40,315,224)"/>
  <rect x="294" y="214" width="9" height="4" rx="2" fill="#C084FC" transform="rotate(15,298,216)"/>
  <rect x="340" y="235" width="10" height="4" rx="2" fill="#34D399" transform="rotate(-10,345,237)"/>
  <rect x="262" y="240" width="9" height="4" rx="2" fill="#FCD34D" transform="rotate(40,266,242)"/>

  <!-- === CHERRY on top === -->
  <line x1="300" y1="182" x2="318" y2="165" stroke="#15803D" stroke-width="3" stroke-linecap="round"/>
  <circle cx="318" cy="158" r="14" fill="#DC2626"/>
  <circle cx="318" cy="158" r="11" fill="#EF4444"/>
  <ellipse cx="313" cy="153" rx="5" ry="3.5" fill="#FCA5A5" opacity="0.5"/>
</svg>