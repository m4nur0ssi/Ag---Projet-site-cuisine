<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hors-ligne · Les Recettes Magiques</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 30% 20%, #1a1024, #0a0a0f 70%);
            color: #fff; text-align: center; padding: 24px;
        }
        .card { max-width: 420px; }
        .emoji { font-size: 4.5rem; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 10px; }
        p { font-size: 1rem; line-height: 1.5; color: rgba(255,255,255,0.65); margin-bottom: 8px; }
        .hint { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 18px; }
        button {
            margin-top: 26px; padding: 14px 28px; border: none; border-radius: 100px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1); color: #fff;
            font-size: 1rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 30px rgba(139,92,246,0.45);
        }
        button:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🍳</div>
        <h1>Pas de connexion</h1>
        <p>Tu es hors-ligne, mais tes recettes favorites et ta liste de courses déjà ouvertes restent accessibles.</p>
        <p class="hint">Reconnecte-toi pour découvrir de nouvelles recettes magiques.</p>
        <button onclick="location.reload()">Réessayer</button>
    </div>
</body>
</html>
