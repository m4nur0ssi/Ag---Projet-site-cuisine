name: Recettes Magiques - Auto Pipeline

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL TikTok de la video (optionnel)"
        required: false
        default: ""
      country:
        description: "Pays choisi par l'utilisateur"
        required: false
        default: ""
      trigger_source:
        description: "Source du declenchement (tiktok, wordpress, manual, triple-click)"
        required: false
        default: "manual"
      delete_id:
        description: "ID de la recette a supprimer de force (optionnel)"
        required: false
        default: ""
  schedule:
    - cron: "0 */6 * * *"
  push:
    paths:
      - 'tiktok-bot/queue.json'

concurrency:
  group: sync-recipes
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Config env
        env:
          WP_PUBLIC_IP: ${{ secrets.WP_PUBLIC_IP }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS || secrets.GEMINI_API_KEY }}
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
          TIKTOK_WEBID: ${{ secrets.TIKTOK_WEBID }}
          TIKTOK_MS_TOKEN: ${{ secrets.TIKTOK_MS_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          cat > tiktok-bot/.env << ENVEOF
          WP_URL=http://${WP_PUBLIC_IP}/wordpress
          WP_USERNAME=${WP_USERNAME}
          WP_PASSWORD=${WP_PASSWORD}
          GEMINI_API_KEYS=${GEMINI_API_KEYS}
          TIKTOK_SESSION_ID=${TIKTOK_SESSION_ID}
          TIKTOK_WEBID=${TIKTOK_WEBID}
          TIKTOK_MS_TOKEN=${TIKTOK_MS_TOKEN}
          PIXABAY_API_KEY=${PIXABAY_API_KEY}
          PORT=3456
          ENVEOF

      - name: Mise en file d'attente (si demande distante via Manual Trigger)
        if: ${{ github.event.inputs.trigger_source == 'tiktok-shortcut' && github.event.inputs.video_url != '' }}
        run: |
          node -e '
            const fs = require("fs");
            const qPath = "tiktok-bot/queue.json";
            let q = { queue: [] };
            if (fs.existsSync(qPath)) q = JSON.parse(fs.readFileSync(qPath, "utf8"));
            q.queue.push({ 
              url: process.env.URL, 
              country: process.env.COUNTRY,
              ts: new Date().toISOString()
            });
            fs.writeFileSync(qPath, JSON.stringify(q, null, 2));
          '
        env:
          URL: ${{ github.event.inputs.video_url }}
          COUNTRY: ${{ github.event.inputs.country }}

      - name: 🍳 TRAITEMENT CLOUD (Favoris + File d'attente)
        run: node tiktok-bot/github-runner.js
        env:
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
          TIKTOK_WEBID: ${{ secrets.TIKTOK_WEBID }}
          TIKTOK_MS_TOKEN: ${{ secrets.TIKTOK_MS_TOKEN }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

      - name: 🧹 NETTOYAGE DES BROUILLONS (Reprocess Stubs)
        run: node tiktok-bot/reprocess-stubs.js
        env:
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
          TIKTOK_WEBID: ${{ secrets.TIKTOK_WEBID }}
          TIKTOK_MS_TOKEN: ${{ secrets.TIKTOK_MS_TOKEN }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

      - name: Synchronisation complete depuis WordPress
        if: ${{ github.event.inputs.trigger_source != 'tiktok-shortcut' }}
        run: |
          node sync-recipes.js --recent --delete-id=${{ github.event.inputs.delete_id }} || echo "Ignored sync error"
        env:
          WP_PUBLIC_IP: ${{ secrets.WP_PUBLIC_IP }}
          WP_FORCE_PUBLIC: "true"
        continue-on-error: true

      - name: Mise a jour timestamp forcee
        run: |
          echo "{\"lastSync\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"trigger\":\"${{ github.event.inputs.trigger_source || 'push/schedule' }}\",\"status\":\"success\"}" > src/data/sync-stats.json

      - name: Commit et Push vers GitHub
        run: |
          git config user.name "rossi manuel"
          git config user.email "m4nu.r0ssi@gmail.com"
          
          # On ajoute TOUS les fichiers qui ont pu changer
          git add src/data/mockData.ts \
                  src/data/sync-stats.json \
                  tiktok-bot/processed-videos.json \
                  tiktok-bot/queue.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "⚠️ Aucun changement detected. Forçage sync-stats..."
            echo "{\"lastSync\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"trigger\":\"forced\",\"ts\":$(date +%s)}" > src/data/sync-stats.json
            git add src/data/sync-stats.json
          fi
          
          COMMIT_MSG="🔄 Cloud Sync: ${{ github.event.inputs.trigger_source || 'auto' }} - $(date -u '+%Y-%m-%d %H:%M')"
          if [ -f tiktok-bot/latest-recipe.txt ]; then
             RECIPE_NAME=$(cat tiktok-bot/latest-recipe.txt)
             COMMIT_MSG="🍳 Nouvelle recette (Cloud): $RECIPE_NAME"
             rm tiktok-bot/latest-recipe.txt
          fi
          
          git commit -m "$COMMIT_MSG" || echo "Rien a committer"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Terminé"
