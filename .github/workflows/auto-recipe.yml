name: Recettes Magiques - Auto Pipeline (iPhone → TikTok → WordPress)

on:
  # ── Déclencheur principal : ajout d'une recette depuis l'iPhone ─────────────
  # L'iOS Shortcut commit dans tiktok-bot/queue.json → ce pipeline se lance
  push:
    paths:
      - 'tiktok-bot/queue.json'

  # ── Cron automatique : vérification favoris TikTok sans Mac ──────────────────
  # Fonctionne 24h/24 même si le Mac est éteint
  schedule:
    - cron: '15 * * * *'  # Toutes les heures (à H:15)

  # ── Déclenchement manuel — TEST / DEBUG UNIQUEMENT ──────────────────────────
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL TikTok de la video (optionnel)"
        required: false
        default: ""
      country:
        description: "Pays choisi par l'utilisateur"
        required: false
        default: ""
      trigger_source:
        description: "Source du declenchement (tiktok, wordpress, manual, triple-click)"
        required: false
        default: "manual"
      delete_id:
        description: "ID de la recette a supprimer de force (optionnel)"
        required: false
        default: ""

concurrency:
  group: sync-recipes
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Config env
        env:
          WP_PUBLIC_IP: ${{ secrets.WP_PUBLIC_IP }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS || secrets.GEMINI_API_KEY }}
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
          TIKTOK_WEBID: ${{ secrets.TIKTOK_WEBID }}
          TIKTOK_MS_TOKEN: ${{ secrets.TIKTOK_MS_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat > tiktok-bot/.env << ENVEOF
          WP_URL=http://${WP_PUBLIC_IP}/wordpress
          WP_USERNAME=${WP_USERNAME}
          WP_PASSWORD=${WP_PASSWORD}
          GEMINI_API_KEYS=${GEMINI_API_KEYS}
          TIKTOK_SESSION_ID=${TIKTOK_SESSION_ID}
          TIKTOK_WEBID=${TIKTOK_WEBID}
          TIKTOK_MS_TOKEN=${TIKTOK_MS_TOKEN}
          PIXABAY_API_KEY=${PIXABAY_API_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          PORT=3456
          ENVEOF

      # ── NETTOYAGE PRÉVENTIF : évite d'utiliser un latest-recipe.txt périmé ──────
      - name: 🧹 Supprimer latest-recipe.txt périmé (si checkout l'a ramené)
        run: rm -f tiktok-bot/latest-recipe.txt

      # ── TRAITEMENT CLOUD : file d'attente iPhone + favoris TikTok ────────────
      - name: 🍳 TRAITEMENT CLOUD (File d'attente iPhone + Favoris TikTok)
        run: node tiktok-bot/github-runner.js
        env:
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
          TIKTOK_WEBID: ${{ secrets.TIKTOK_WEBID }}
          TIKTOK_MS_TOKEN: ${{ secrets.TIKTOK_MS_TOKEN }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS || secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL: http://${{ secrets.WP_PUBLIC_IP }}/wordpress
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

      # ── NETTOYAGE DES BROUILLONS INCOMPLETS ─────────────────────────────────
      - name: 🧹 NETTOYAGE DES BROUILLONS (Reprocess Stubs)
        run: node tiktok-bot/reprocess-stubs.js
        env:
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
          TIKTOK_WEBID: ${{ secrets.TIKTOK_WEBID }}
          TIKTOK_MS_TOKEN: ${{ secrets.TIKTOK_MS_TOKEN }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS || secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL: http://${{ secrets.WP_PUBLIC_IP }}/wordpress
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        continue-on-error: true

      # ── NOTE : La sync WordPress → mockData.ts est gérée automatiquement ────
      # par wp-sync.yml via le webhook WordPress (repository_dispatch).
      # On ne la duplique PAS ici pour éviter les conflits de concurrence.

      - name: Commit et Push vers GitHub
        run: |
          git config user.name "rossi manuel"
          git config user.email "m4nu.r0ssi@gmail.com"

          git add tiktok-bot/processed-videos.json \
                  tiktok-bot/queue.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "✅ Aucun changement détecté, arrêt sans commit."
            exit 0
          fi

          COMMIT_MSG="🔄 Cloud Sync [skip ci]: ${{ github.event.inputs.trigger_source || 'push-queue' }} - $(date -u '+%Y-%m-%d %H:%M')"
          if [ -f tiktok-bot/latest-recipe.txt ]; then
             RECIPE_NAME=$(cat tiktok-bot/latest-recipe.txt)
             COMMIT_MSG="🍳 Nouvelle recette (Cloud): $RECIPE_NAME"
             rm tiktok-bot/latest-recipe.txt
          fi

          git commit -m "$COMMIT_MSG" || echo "Rien a committer"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Terminé"
